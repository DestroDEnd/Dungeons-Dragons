<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anvil Crawler Lightning Preview</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background-color: #050508;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  canvas {
    width: 100%;
    height: 100%;
    image-rendering: pixelated; /* Forces sharp pixels when scaled up */
  }
  .controls {
    position: absolute;
    top: 20px;
    left: 20px;
    color: white;
    font-family: monospace;
    background: rgba(0,0,0,0.7);
    padding: 10px;
    border: 1px solid white;
  }
</style>
</head>
<body>

<div class="controls">
  <h1>Anvil Crawler Preview</h1>
  <p>Click anywhere to trigger a strike!</p>
</div>

<canvas id="lightningCanvas"></canvas>

<script>
  const canvas = document.getElementById('lightningCanvas');
  const ctx = canvas.getContext('2d');

  // Higher internal resolution for sharper lightning lines
  const W = 800;
  const H = 450;
  canvas.width = W;
  canvas.height = H;

  let isStriking = false;
  let strikeAlpha = 0;
  let flashAlpha = 0;
  let lines = [];

  function generateBranch(x, y, angle, length, branchChance, depth) {
    if (depth <= 0) return;

    let nextX = x + Math.cos(angle) * length;
    let nextY = y + Math.sin(angle) * length;

    lines.push({x1: x, y1: y, x2: nextX, y2: nextY, depth: depth});

    // Continue main path
    let wiggle = (Math.random() - 0.5) * 0.8;
    generateBranch(nextX, nextY, angle + wiggle, length * (0.8 + Math.random()*0.4), branchChance, depth - 1);

    // Fork/branch out
    if (Math.random() < branchChance) {
      let forkAngle = angle + (Math.random() > 0.5 ? 1 : -1) * (0.5 + Math.random() * 0.8);
      generateBranch(nextX, nextY, forkAngle, length * 0.8, branchChance * 0.6, depth - (Math.floor(Math.random()*2) + 1));
    }
  }

  function triggerStrike() {
    if (isStriking) return;
    isStriking = true;
    strikeAlpha = 1.0;
    flashAlpha = 0.6;
    lines = [];

    const numStarts = Math.floor(Math.random() * 2) + 1;
    for(let i=0; i<numStarts; i++) {
      let startX = Math.random() * W;
      // Anvil crawlers go horizontally
      let baseAngle = Math.random() > 0.5 ? 0.2 : Math.PI - 0.2; 
      generateBranch(startX, 0, baseAngle, 30 + Math.random() * 20, 0.6, 12);
    }
  }

  function draw() {
    // Clear screen slightly for fade effect
    ctx.fillStyle = 'rgba(5, 5, 8, 0.3)';
    ctx.fillRect(0, 0, W, H);

    if (isStriking) {
      // Draw screen flash
      if (flashAlpha > 0) {
        ctx.fillStyle = `rgba(255, 255, 255, ${flashAlpha})`;
        ctx.fillRect(0, 0, W, H);
        flashAlpha -= 0.15;
      }

      // Draw all lightning lines instantly
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      
      // Draw outer glow
      ctx.shadowBlur = 10;
      ctx.shadowColor = 'rgba(100, 200, 255, 1)';
      ctx.strokeStyle = `rgba(255, 255, 255, ${strikeAlpha})`;
      
      for (let l of lines) {
        ctx.lineWidth = l.depth > 8 ? 3 : (l.depth > 4 ? 2 : 1);
        ctx.beginPath();
        ctx.moveTo(l.x1, l.y1);
        ctx.lineTo(l.x2, l.y2);
        ctx.stroke();
      }
      
      // Reset shadow for performance
      ctx.shadowBlur = 0;

      strikeAlpha -= 0.05;
      if (strikeAlpha <= 0) {
        isStriking = false;
        lines = [];
      }
    }

    requestAnimationFrame(draw);
  }

  draw();

  setInterval(() => {
    if (Math.random() < 0.4) triggerStrike();
  }, 1500);

  window.addEventListener('click', triggerStrike);

</script>
</body>
</html>
